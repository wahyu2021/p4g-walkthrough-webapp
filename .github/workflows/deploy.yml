name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Execute remote ssh commands using ssh key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pastikan environment PATH terbaca agar command npm dan pm2 dikenali
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            
            echo "========================================="
            echo "🚀 MEMULAI DEPLOYMENT KE PRODUCTION 🚀"
            echo "========================================="
            
            # Pindah ke direktori project
            cd /var/www/p4g-webapp
            
            echo "📦 Menarik kode terbaru dari GitHub..."
            # Reset hard untuk mencegah konflik file lokal
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            echo "========================================="
            echo "🔧 UPDATE BACKEND (EXPRESS API)"
            echo "========================================="
            cd /var/www/p4g-webapp/backend
            
            # Suntikkan password dari Github Secret ke .env backend secara otomatis
            if ! grep -q "LOGIN_PASSWORD=" .env; then
              echo "LOGIN_PASSWORD=${{ secrets.APP_PASSWORD }}" >> .env
            else
              sed -i 's/^LOGIN_PASSWORD=.*/LOGIN_PASSWORD=${{ secrets.APP_PASSWORD }}/' .env
            fi

            npm install
            npm run build
            
            # Restart PM2
            pm2 restart p4g-api || pm2 start dist/index.js --name 'p4g-api'
            
            # 🩺 HEALTH CHECK: Beri waktu 3 detik untuk peladen booting
            sleep 3
            STATUS=$(pm2 jlist | jq -r '.[] | select(.name=="p4g-api") | .pm2_env.status')
            if [ "$STATUS" != "online" ]; then
              echo "❌ ERROR FATAL: BACKEND GAGAL START ATAU CRASH!"
              echo "Sedang menampilkan log kerusakan:"
              pm2 logs p4g-api --lines 40 --nostream
              exit 1
            fi
            echo "✅ Backend berjalan dan sehat."
            
            echo "========================================="
            echo "🎨 UPDATE FRONTEND (REACT VITE)"
            echo "========================================="
            cd /var/www/p4g-webapp/webapp
            
            # Pastikan .env.production selalu ada dengan konfigurasi terbaru
            echo "VITE_API_URL=https://p4g.simpatik.web.id/api" > .env.production
            echo "VITE_LOGIN_PASSWORD=${{ secrets.APP_PASSWORD }}" >> .env.production

            npm install
            npm run build
            
            # Simpan state PM2
            pm2 save
            
            echo "========================================="
            echo "✅ PROSES DEPLOYMENT SELESAI DENGAN SUKSES!"
            echo "========================================="
            pm2 status
